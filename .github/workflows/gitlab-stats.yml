name: Update GitLab Stats

on:
  schedule:
    - cron: "0 6 * * *" # Weekdays at 6 AM UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-gitlab-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Fetch GitLab stats and generate SVGs
        env:
          GITLAB_ACCOUNTS: ${{ secrets.GITLAB_ACCOUNTS }}
          # Legacy single-account fallback (used if GITLAB_ACCOUNTS is not set)
          GITLAB_URL: ${{ secrets.GITLAB_URL }}
          GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
          GITLAB_USER_ID: ${{ secrets.GITLAB_USER_ID }}
        run: python scripts/fetch_gitlab_stats.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/gitlab-stats.svg assets/gitlab-streak.svg assets/gitlab-langs.svg assets/gitlab-activity-graph.svg assets/gitlab-meta.json
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: update GitLab stats"
          git push
